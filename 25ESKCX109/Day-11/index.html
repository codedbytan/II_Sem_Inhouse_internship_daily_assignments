<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 11 - Registration Confirmation System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>STUDENT REGISTRATION</h1>

<div class="container">

    <!-- STEP 1: the form -->
    <form id="registrationForm" novalidate>
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name">
        <small class="error-msg" id="nameError"></small>

        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email">
        <small class="error-msg" id="emailError"></small>

        <label>Roll Number</label>
        <input type="text" id="roll" placeholder="e.g. 25ESKCX109">
        <small class="error-msg" id="rollError"></small>

        <label>Mobile Number</label>
        <input type="tel" id="mobile" placeholder="10-digit mobile number">
        <small class="error-msg" id="mobileError"></small>

        <label>Branch</label>
        <select id="branch">
            <option value="">Select Branch</option>
            <option>Data Science (DS)</option>
            <option>Computer Science (CS)</option>
            <option>IT</option>
            <option>ECE</option>
        </select>
        <small class="error-msg" id="branchError"></small>

        <button type="submit">Review Details</button>
    </form>

    <!-- STEP 2: the confirmation panel (hidden until the form is valid) -->
    <div id="confirmPanel" class="hidden">
        <h2>Please Confirm Your Details</h2>
        <table class="confirm-table">
            <tr><th>Full Name</th><td id="c_name"></td></tr>
            <tr><th>Email</th><td id="c_email"></td></tr>
            <tr><th>Roll Number</th><td id="c_roll"></td></tr>
            <tr><th>Mobile</th><td id="c_mobile"></td></tr>
            <tr><th>Branch</th><td id="c_branch"></td></tr>
        </table>
        <div class="btn-row">
            <button type="button" id="editBtn" class="secondary">Edit</button>
            <button type="button" id="confirmBtn">Confirm &amp; Register</button>
        </div>
    </div>

    <!-- STEP 3: final success message -->
    <div id="finalMsg" class="hidden success-box">
        <h2>Registration Confirmed!</h2>
        <p id="finalText"></p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
